# ==============================================================================
# HPX 常用运行时配置（中文说明版）
# ==============================================================================
#
# 本文件与 ../hpx.ini 使用相同的配置项，并补充中文调优说明。所有赋值默认保持
# 注释，因此直接加载本文件不会覆盖当前 HPX 构建的内建默认值。复制本文件后，
# 只取消应用确实需要覆盖的配置项。
#
# 每个配置项按以下维度说明：
#   取值范围：HPX 接受的值或受实现约束的范围。
#   推荐配置：常见场景的起始值，不是脱离负载和硬件条件的最优值。
#   配置依据：当前 HPX 源码默认值、运行机制或工程经验。
#   作用与关联：配置产生的效果，以及需要一起考虑或不能同时使用的配置。
#
# 加载方式：
#
#   ./your_hpx_application --hpx:config=/path/to/hpx.ini
#
# 检查最终生效值：
#
#   ./your_hpx_application \
#     --hpx:config=/path/to/hpx.ini \
#     --hpx:dump-config
#
# 建议先记录基线吞吐、尾延迟、CPU 利用率、跨 NUMA 访问和网络流量，再一次只修改
# 一组相关配置。完整配置键、构建相关项和插件专用项见 ../hpx.reference.ini。
# ==============================================================================


# ------------------------------------------------------------------------------
# Worker 资源与调度
# ------------------------------------------------------------------------------
[hpx]

# HPX worker OS 线程数。
# 取值范围：正整数、all、cores。
# 推荐配置：通用服务从 cores 开始；需要利用 SMT/超线程且实测有收益时使用 all；
#           与其他进程共享 CPU 时使用明确的正整数。
# 配置依据：当前 HPX 默认值为 cores，即每个可用物理 core 一个 worker。
# 作用与关联：直接决定默认调度池并发度；受 cores、use_process_mask、affinity 和
#             bind 限制，并作为 max_background_threads 的默认来源。阻塞等待依赖
#             同一调度池的任务时至少保留两个可运行 worker。
# os_threads = ${HPX_NUM_WORKER_THREADS:cores}

# HPX 可使用的 core 数量。
# 取值范围：正整数或 all，不能超过当前进程可见拓扑。
# 推荐配置：通常保持 all；只在需要给操作系统、网络中断或其他服务预留 core 时限制。
# 配置依据：当前 HPX 默认值为 all，实际可见范围仍受进程 CPU mask 约束。
# 作用与关联：限制 os_threads 可分布的拓扑范围；与 affinity、bind、
#             use_process_mask 和进程自身 CPU affinity 共同决定最终 worker 布局。
# cores = all

# 初始 HPX locality 数量。
# 取值范围：正整数；单进程应用为 1。
# 推荐配置：单机单进程使用 1；多 locality 部署由启动器按实际节点数统一设置。
# 配置依据：HPX 的默认启动模式只等待一个 locality。
# 作用与关联：大于 1 时会启用分布式启动协调，需要同时正确配置 runtime_mode、
#             hpx.agas 和 hpx.parcel；所有 locality 必须使用一致的总数。
# localities = 1

# 当前进程的 HPX runtime 角色。
# 取值范围：console、worker、connect、local。
# 推荐配置：分布式任务只设置一个 console，其余使用 worker；动态加入使用 connect；
#           仅使用本地 runtime 能力且不需要 parcel/AGAS 时才使用 local。
# 配置依据：HPX 分布式运行要求恰好一个 console locality 负责协调。
# 作用与关联：决定是否运行 hpx_main、是否连接 AGAS 以及是否参与 parcel 网络；通常
#             由启动命令/启动器决定，不建议在所有节点共用的 INI 中强制写死。
# runtime_mode = console

# 默认线程池调度策略。
# 取值范围：local、local-priority-fifo、local-priority-lifo、static、
#           static-priority、abp-priority-fifo、abp-priority-lifo、
#           local-workrequesting-fifo、local-workrequesting-lifo、
#           local-workrequesting-mc；具体可用项受当前 HPX 构建影响。
# 推荐配置：通用异步服务使用 local-priority-fifo；任务分布固定且追求可重复性时，可在
#           基准测试后尝试 static；其他策略应以目标负载的吞吐和尾延迟测试为依据。
# 配置依据：当前 HPX 默认值为 local-priority-fifo，兼顾优先级和本地队列窃取。
# 作用与关联：控制任务入队、优先级和 work stealing；与 numa_sensitive、affinity、
#             bind 以及高优先级线程设置共同决定调度行为。
# scheduler = local-priority-fifo

# 自动 affinity 使用的硬件域。
# 取值范围：pu、core、numa、machine。
# 推荐配置：通用 CPU 密集型任务从 core 开始；明确希望使用 SMT sibling 时选 pu；
#           numa/machine 只在对应拓扑策略经过验证后使用。
# 配置依据：HPX 命令行处理后的常见有效默认值为 pu；core 通常更容易避免多个 worker
#           竞争同一物理 core 的执行资源。
# 作用与关联：决定 worker 被约束到哪一级硬件对象；不要与显式 bind 同时设置，
#             use_process_mask=1 时只能在进程允许的 CPU 集合内分配。
# affinity = core

# 显式 worker 绑定策略。
# 取值范围：balanced、compact、scatter、none，或 HPX affinity 语法支持的详细描述。
# 推荐配置：通用独占计算节点从 balanced 开始；延迟敏感服务按 NUMA 拓扑评测
#           compact/scatter；需要由操作系统调度时使用 none。
# 配置依据：HPX 在未给出显式绑定时通常生成 balanced；不同策略的优劣取决于共享缓存、
#           NUMA 访问和任务通信模式。
# 作用与关联：直接决定每个 worker 的 CPU mask，并隐含 NUMA-sensitive 行为；不要与
#             affinity、pu_step 或 pu_offset 同时设置。需要确认时使用 --hpx:print-bind。
# bind = balanced

# 调度器 NUMA 敏感级别。
# 取值范围：0、1、2。
# 推荐配置：单 NUMA 节点或未测量时使用 0；跨 NUMA 机器从 1 开始评测；只有确认更严格
#           NUMA 策略有收益时使用 2。
# 配置依据：当前 HPX 默认值为 0；NUMA 感知可减少远端内存访问，但也可能限制任务窃取。
# 作用与关联：影响 scheduler 的跨 NUMA work stealing；与 bind 和 affinity 的布局共同
#             生效，单独提高此值不能修复错误的线程/内存放置。
# numa_sensitive = 0

# 是否遵守进程继承的 CPU affinity mask。
# 取值范围：0 或 1。
# 推荐配置：容器、cgroup、taskset、批处理系统或共享主机使用 1；由 HPX 独占并管理整机
#           拓扑时可保持 0。
# 配置依据：当前 HPX 默认值为 0；启用后 HPX 只把进程 mask 内的 PU 视为可用资源。
# 作用与关联：限制 cores、os_threads、affinity 和 bind 的可选 CPU 集合；如果请求的
#             worker 数超过 mask 可容纳的资源，启动阶段会报告配置错误。
# use_process_mask = 1

# 允许执行 scheduler background work 的 worker 数量。
# 取值范围：非负整数；有效值通常无需超过 os_threads，超出时也不会产生
#           更多 worker。
# 推荐配置：通常保持与 os_threads 相同；只有确认后台工作与业务任务竞争时再逐步减少，
#           网络 runtime 不建议未经测试设为 0。
# 配置依据：当前 HPX 默认值继承 hpx.os_threads，使所有 worker 都可推进后台工作。
# 作用与关联：影响 scheduler 后台维护以及部分通信进度；上限应与 os_threads 一致，
#             parcel 插件还可能有各自的 max_background_threads 覆盖项。
# max_background_threads = ${HPX_MAX_BACKGROUND_THREADS:$[hpx.os_threads]}


# ------------------------------------------------------------------------------
# 关闭过程与故障诊断
# ------------------------------------------------------------------------------

# runtime 关闭超时，单位为秒。
# 取值范围：-1 表示不设超时；0 或正浮点数表示最长等待时间。
# 推荐配置：开发和离线任务可用 -1；需要受控退出的在线服务从 30～60 秒开始，根据实际
#           清理时间调整。
# 配置依据：当前 HPX 默认值为 -1.0，避免正常的长时间清理被提前中断。
# 作用与关联：限制 finalize/关闭阶段等待时间；必须覆盖应用 stop/wait_stop、网络排空和
#             日志刷新所需时间，过小会把正常慢关闭误判为故障。
# shutdown_timeout = ${HPX_SHUTDOWN_TIMEOUT:-1.0}

# 自动附加调试器的触发类别。
# 取值范围：空值/off、startup、exception、test-failure。
# 推荐配置：生产环境保持空值/off；交互式开发可使用 exception；测试诊断可使用
#           test-failure。
# 配置依据：HPX 只在配置值与对应触发类别匹配时调用 debugger attach 逻辑。
# 作用与关联：可能让进程暂停等待调试器，不适合无人值守服务；与 handle_signals、
#             exception_verbosity 和 trace_depth 一起构成故障诊断策略。
# attach_debugger = ${HPX_ATTACH_DEBUGGER}

# 异常信息详细级别。
# 取值范围：整数；<=0 输出基本异常位置，1 省略构建配置和环境变量，>=2 输出全部信息。
# 推荐配置：开发/测试使用 2；关注日志体积或环境信息暴露的生产环境使用 1；只有极端
#           精简需求才使用 0。
# 配置依据：当前 HPX 默认值为 2，源码按 0、1、>=2 三档处理。
# 作用与关联：控制异常诊断内容，不改变异常处理语义；堆栈帧数量由 trace_depth 控制。
# exception_verbosity = ${HPX_EXCEPTION_VERBOSITY:2}

# 异常和信号回溯的最大堆栈层数。
# 取值范围：非负整数；0 表示不输出堆栈帧，实际能力受 HPX 构建选项限制。
# 推荐配置：从 20 开始；深调用链可提高到 32～64，需同时评估日志大小和回溯开销。
# 配置依据：当前参考默认值为 20，足以覆盖多数调度和业务调用链。
# 作用与关联：仅影响生成回溯时的深度；与 exception_verbosity、handle_signals 和
#             attach_debugger 配合使用。
# trace_depth = ${HPX_TRACE_DEPTH:20}

# 是否由 HPX 注册致命信号处理器。
# 取值范围：0 或 1。
# 推荐配置：需要 HPX 现场诊断时使用 1；依赖系统 core dump、sanitizer 或应用自有信号
#           处理器时使用 0，并验证最终信号处理器的安装顺序。
# 配置依据：当前 HPX 默认值为 1，会在信号发生时打印配置、系统信息和回溯。
# 作用与关联：影响崩溃诊断路径；与 trace_depth、exception_verbosity、操作系统 core
#             dump 策略以及 zpp/应用层信号处理器相关。
# handle_signals = ${HPX_HANDLE_SIGNALS:1}

# 是否由 HPX 注册内存分配失败处理器。
# 取值范围：0 或 1。
# 推荐配置：一般使用 1；已有统一 OOM 处理、故障注入或希望由上层完全接管时使用 0。
# 配置依据：当前 HPX 默认值为 1，以便在分配失败时输出运行时诊断信息。
# 作用与关联：只改变 allocation failure 的诊断/处理入口；与进程内其他 new_handler
#             只能有一个最终生效者，需结合 zpp/应用初始化顺序验证。
# handle_failed_new = ${HPX_HANDLE_FAILED_NEW:1}


# ------------------------------------------------------------------------------
# HPX 内部 OS 线程池
# 只有当前 HPX 构建启用对应功能时才生效。这些线程通常不计入 os_threads。
# ------------------------------------------------------------------------------
[hpx.threadpools]

# 通用异步 I/O 线程池大小。
# 取值范围：启用 HPX_WITH_IO_POOL 时使用正整数。
# 推荐配置：从 2 开始；低 I/O 负载可用 1，高并发阻塞 I/O 经 profiling 后使用 2～4。
# 配置依据：当前 HPX 参考默认值为 2；线程过多会增加调度和上下文切换开销。
# 作用与关联：影响 HPX I/O 服务吞吐，不替代默认 worker；会增加进程总 OS 线程数，需与
#             os_threads 和 CPU 预留一起评估。
# io_pool_size = ${HPX_NUM_IO_POOL_SIZE:2}

# parcel 网络线程池大小。
# 取值范围：启用 HPX_WITH_NETWORKING 时使用正整数。
# 推荐配置：从 2 开始；单 locality 或低网络流量可用 1，高吞吐多 locality 场景再评测
#           2～4。
# 配置依据：当前 HPX 参考默认值为 2，parcel 插件默认继承该配置。
# 作用与关联：负责 parcel 网络相关异步工作；与 hpx.parcel.*、网络插件自己的
#             parcel_pool_size 以及 max_background_threads 共同影响通信进度。
# parcel_pool_size = ${HPX_NUM_PARCEL_POOL_SIZE:2}

# timer 线程池大小。
# 取值范围：启用 HPX_WITH_TIMER_POOL 时使用正整数。
# 推荐配置：通常 1～2，默认从 2 开始；只有大量高频 timer 回调出现排队时才增加。
# 配置依据：当前 HPX 参考默认值为 2，多余 timer 线程可能增加唤醒和竞争。
# 作用与关联：影响 HPX timer 服务，不等于应用 worker 数；与定时任务数量、回调耗时和
#             os_threads 的业务执行能力共同决定定时响应延迟。
# timer_pool_size = ${HPX_NUM_TIMER_POOL_SIZE:2}


# ------------------------------------------------------------------------------
# 分布式 runtime 与 AGAS
# 仅多 locality 应用需要主动配置；启动器提供的参数通常优先于这里的值。
# ------------------------------------------------------------------------------
[hpx.agas]

# AGAS 根服务地址。
# 取值范围：可解析的主机名或 IP 地址。
# 推荐配置：单机使用 127.0.0.1；跨机器部署使用所有 locality 可访问的固定服务地址，
#           不要使用只在本机可达的 loopback 地址。
# 配置依据：AGAS 为分布式对象提供全局地址解析，所有 locality 必须连接同一根服务。
# 作用与关联：与 port 共同构成 AGAS endpoint；bootstrap locality 监听该地址，hosted
#             locality 连接该地址；不要与 parcel address 混淆。
# address = ${HPX_AGAS_SERVER_ADDRESS:127.0.0.1}

# AGAS 根服务端口。
# 取值范围：0～65535；0 可由启动器/runtime 解析，显式分布式部署通常使用
#           1～65535 中未被占用且通过防火墙的端口。
# 推荐配置：从当前 HPX 参考端口 7910 开始；同一主机运行多套 runtime 时分配不同端口。
# 配置依据：当前源码基线使用 HPX_INITIAL_IP_PORT=7910 作为常用起点。
# 作用与关联：必须与 address、service_mode 及所有 locality 的启动参数一致；不要和同一
#             地址上的 parcel 监听端口冲突。
# port = ${HPX_AGAS_SERVER_PORT:7910}

# 当前 locality 的 AGAS 服务角色。
# 取值范围：bootstrap 或 hosted。
# 推荐配置：通常不在共享 INI 中写死，由启动器设置；唯一根服务使用 bootstrap，其他
#           locality 使用 hosted。
# 配置依据：一个分布式 HPX runtime 只需要一个 bootstrap AGAS 服务。
# 作用与关联：决定是监听还是连接 AGAS endpoint；与 runtime_mode、localities、address
#             和 port 必须一致，错误设置会导致启动等待或连接失败。
# service_mode = hosted

# AGAS 本地地址转换 cache 容量。
# 取值范围：非负整数；表示条目数，启用 range cache 时表示 range 数。
# 推荐配置：从 4096 开始；对象/组件数量大且 cache miss 明显时按 2 倍逐步增加。
# 配置依据：当前 HPX 参考默认值为 4096；更大 cache 用内存换取更少远程 AGAS 查询。
# 作用与关联：仅在 use_caching=1 时生效；use_range_caching=1 会改变容量单位的含义。
# local_cache_size = ${HPX_AGAS_LOCAL_CACHE_SIZE:4096}

# 是否使用 range-based AGAS cache。
# 取值范围：0 或 1。
# 推荐配置：连续地址范围较多的常规分布式应用使用 1；若地址分布高度离散且实测 range
#           cache 命中率差，再尝试 0。
# 配置依据：当前 HPX 默认值为 1，range cache 可用一个记录覆盖连续对象地址。
# 作用与关联：只有 use_caching=1 时生效；启用后 local_cache_size 表示最大 range 数。
# use_range_caching = ${HPX_AGAS_USE_RANGE_CACHING:1}

# 是否启用 AGAS 客户端地址转换 cache。
# 取值范围：0 或 1。
# 推荐配置：通常使用 1；只有定位一致性问题、测量无 cache 基线或对象地址几乎不复用时
#           才临时使用 0。
# 配置依据：当前 HPX 默认值为 1，远程 AGAS 查询通常比本地 cache 查找昂贵。
# 作用与关联：关闭后 local_cache_size 和 use_range_caching 被忽略，并可能显著增加 AGAS
#             网络请求和延迟。
# use_caching = ${HPX_AGAS_USE_CACHING:1}


# ------------------------------------------------------------------------------
# Parcel 网络
# 只有启用 HPX_WITH_NETWORKING 和相应 parcel 插件时才生效。
# ------------------------------------------------------------------------------
[hpx.parcel]

# 当前 locality 的 parcel 监听地址。
# 取值范围：可解析的主机名或 IP 地址。
# 推荐配置：单机使用 127.0.0.1；跨机部署绑定可被其他 locality 访问的明确网卡地址，
#           多网卡主机不要依赖不确定的 hostname 解析顺序。
# 配置依据：parcel 负责 locality 之间的数据和 action 传输，监听地址必须对等端可达。
# 作用与关联：与 port 组成 parcel endpoint；受启动参数 --hpx:hpx 覆盖，并与 AGAS
#             endpoint 分工不同。
# address = ${HPX_PARCEL_SERVER_ADDRESS:127.0.0.1}

# 当前 locality 的 parcel 监听端口。
# 取值范围：0～65535；0 可由启动器/runtime 解析，显式绑定通常使用
#           1～65535 中未被占用且通过防火墙的端口。
# 推荐配置：从 7910 开始，由启动器为同机多个 locality 分配不同端口。
# 配置依据：当前 HPX 源码基线的常用初始端口为 7910。
# 作用与关联：与 address 和实际 parcel 插件共同决定连接入口；不能和 AGAS 或同机其他
#             locality 的监听端口冲突。
# port = ${HPX_PARCEL_SERVER_PORT:7910}

# 每个 locality 保持的连接总数上限。
# 取值范围：>=2；必须 >= max_connections_per_locality。
# 推荐配置：从 512 开始；小集群可按 locality 数量乘以单 locality 上限估算后下调，
#           大集群根据连接 cache 命中、文件描述符和内存占用调整。
# 配置依据：当前 HPX 默认值为 512；源码会把小于 2 的值提升到 2。
# 作用与关联：限制连接 cache 总容量；与 max_connections_per_locality、localities、OS
#             fd limit 和具体 parcel 插件配置相关。
# max_connections = ${HPX_PARCEL_MAX_CONNECTIONS:512}

# 对单个远端 locality 的连接数上限。
# 取值范围：>=2 且 <= max_connections。
# 推荐配置：从 4 开始；小消息高并发且单连接成为瓶颈时逐步增加，低流量场景可保持 2～4。
# 配置依据：当前 HPX 默认值为 4；源码要求该值不能超过连接总数上限。
# 作用与关联：控制单个对端的并行连接和复用程度；必须与 max_connections、远端数量和
#             网络 fd/内存预算一起规划。
# max_connections_per_locality = ${HPX_PARCEL_MAX_CONNECTIONS_PER_LOCALITY:4}

# 可接收/传输的单个 parcel 消息最大尺寸，单位字节。
# 取值范围：非负整数；有效业务配置应使用正整数，并覆盖应用可能产生的
#           最大序列化消息。
# 推荐配置：安全边界明确的在线服务设置为实测最大消息的 1.2～2 倍；兼容旧行为可从
#           1000000000 开始，但不建议无条件保留过大的上限。
# 配置依据：当前 HPX 默认值为 1000000000；较小上限可更早拒绝异常超大消息。
# 作用与关联：必须 >= max_outbound_message_size，并与应用序列化对象、网络缓冲和内存
#             上限共同评估。
# max_message_size = ${HPX_PARCEL_MAX_MESSAGE_SIZE:1000000000}

# 出站合并消息最大尺寸，单位字节。
# 取值范围：非负整数且 <= max_message_size；正常网络传输应使用正整数。
# 推荐配置：从 1000000（约 1 MB）开始；低延迟小消息场景可下调，吞吐优先且网络允许时
#           经测量后上调。
# 配置依据：当前 HPX 默认值为 1000000，在批量发送收益与单次缓冲占用之间折中。
# 作用与关联：控制出站 coalescing/序列化批量大小；与 max_message_size、网络 MTU、
#             内存峰值和尾延迟相关。
# max_outbound_message_size = ${HPX_PARCEL_MAX_OUTBOUND_MESSAGE_SIZE:1000000}

# 是否允许连续数组序列化优化。
# 取值范围：0 或 1。
# 推荐配置：通常使用 1；只有排查序列化兼容性或自定义 archive 问题时临时使用 0。
# 配置依据：当前 HPX 默认值为 1，连续数组可避开逐元素序列化开销。
# 作用与关联：zero_copy_optimization 默认继承此值；跨端序列化格式、字节序和类型兼容性
#             仍需由 HPX archive 保证。
# array_optimization = ${HPX_PARCEL_ARRAY_OPTIMIZATION:1}

# 是否允许发送端零拷贝序列化优化。
# 取值范围：0 或 1。
# 推荐配置：大数组/大 buffer 网络传输通常使用 1；小消息为主时保持默认并通过 profiling
#           判断，不建议凭感觉关闭。
# 配置依据：当前 HPX 默认继承 array_optimization，减少大块数据的复制和分配。
# 作用与关联：与 array_optimization、zero_copy_receive_optimization、零拷贝阈值以及
#             具体 parcel 插件能力相关。
# zero_copy_optimization = ${HPX_PARCEL_ZERO_COPY_OPTIMIZATION:$[hpx.parcel.array_optimization]}

# 是否允许接收端零拷贝反序列化优化。
# 取值范围：0 或 1。
# 推荐配置：发送端和接收端均支持且大消息占比较高时使用 1；定位 buffer 生命周期或
#           自定义序列化问题时可临时关闭。
# 配置依据：当前 HPX 默认继承 zero_copy_optimization，使收发两端策略保持一致。
# 作用与关联：应与 zero_copy_optimization 和 array_optimization 一起配置；单独开启
#             不能保证插件或数据类型具备零拷贝条件。
# zero_copy_receive_optimization = ${HPX_PARCEL_ZERO_COPY_RECEIVE_OPTIMIZATION:$[hpx.parcel.zero_copy_optimization]}

# 是否允许在独立 HPX 线程中异步执行 parcel 编码/解码。
# 取值范围：0 或 1。
# 推荐配置：网络负载和序列化开销明显时使用 1；极小消息、极低并发场景可对比 0 的延迟，
#           以实测结果决定。
# 配置依据：当前 HPX 默认值为 1，可避免较重序列化长时间占用通信调用路径。
# 作用与关联：会增加调度任务，与 os_threads、scheduler、parcel_pool_size 和消息尺寸
#             共同影响吞吐、排队和尾延迟。
# async_serialization = ${HPX_PARCEL_ASYNC_SERIALIZATION:1}


# ------------------------------------------------------------------------------
# HPX 内部日志
# 只有启用 HPX_WITH_LOGGING 时生效。zpp/spdlog 业务日志不受这些配置控制。
# 日志级别：0 关闭、1 fatal、2 error、3 warning、4 info、5 debug。
# destination 可使用 console、cout、cerr、file(filename)，Android 还支持
# android_log；多个目的地以空格分隔。
# ------------------------------------------------------------------------------
[hpx.logging]

# HPX 通用内部日志级别。
# 取值范围：0～5。
# 推荐配置：正常生产运行使用 0；故障定位先用 2～3；4～5 只在限定时间和磁盘预算下启用。
# 配置依据：HPX 日志级别越高输出越详细，5 会启用全部 debug 消息并显著增加 I/O。
# 作用与关联：控制线程管理、LCO 等通用 runtime 日志；各分类日志可单独覆盖，不影响
#             zpp/spdlog 的日志级别。
# level = ${HPX_LOGLEVEL:0}

# HPX 通用内部日志输出目的地。
# 取值范围：console、cout、cerr、file(filename)、Android 的 android_log，
#           或这些目的地的空格分隔组合。
# 推荐配置：多 locality 使用 console 汇聚；单机临时诊断可使用 cerr；长期启用时写入
#           有轮转/清理策略的文件路径。
# 配置依据：当前 HPX 默认值为 console，即把各 locality 日志转发到 console locality。
# 作用与关联：只有 level>0 时有明显输出；file 路径和生命周期独立于 zpp 日志文件，
#             需要单独规划磁盘空间与轮转。
# destination = ${HPX_LOGDESTINATION:console}

[hpx.logging.timing]

# HPX timing 分类日志级别。
# 取值范围：-1、0～5；-1 表示保持该分类关闭/继承关闭状态，0 关闭，1～5 逐级增大详情。
# 推荐配置：正常运行使用 -1；仅在分析 runtime 阶段耗时且有明确采样窗口时使用 3～5。
# 配置依据：当前 HPX 默认值为 -1，timing 日志可能产生大量诊断输出。
# 作用与关联：只控制 timing 分类；仍需 destination 可写，并与通用日志、系统 profiler
#             和业务指标结合分析。
# level = ${HPX_TIMING_LOGLEVEL:-1}

# timing 分类日志输出目的地。
# 取值范围：console、cout、cerr、file(filename)、Android 的 android_log，
#           或空格分隔组合。
# 推荐配置：短时交互诊断使用 console/cerr；持续采集使用独立文件并配置外部轮转。
# 配置依据：分类独立输出可避免 timing 信息淹没通用 runtime 日志。
# 作用与关联：仅在 timing level>0 时输出；多 locality 的 console 目的地会把日志汇聚到
#             console locality，需评估网络和中心节点 I/O。
# destination = ${HPX_TIMING_LOGDESTINATION:console}

[hpx.logging.parcel]

# HPX parcel 分类日志级别。
# 取值范围：-1、0～5；-1/0 关闭，1～5 从 fatal 到 debug。
# 推荐配置：正常运行使用 -1；连接或传输故障先使用 2～3；5 只用于短时复现。
# 配置依据：parcel debug 日志可能按连接和消息路径高频产生，长期启用成本较高。
# 作用与关联：用于诊断 hpx.parcel.* 和具体 parcel 插件行为；应与网络抓包、连接数量、
#             AGAS 日志及应用请求链路时间一起分析。
# level = ${HPX_PARCEL_LOGLEVEL:-1}

# parcel 分类日志输出目的地。
# 取值范围：console、cout、cerr、file(filename)、Android 的 android_log，
#           或空格分隔组合。
# 推荐配置：优先使用带 PID 的独立文件，避免多个 locality 写同一文件；集中诊断时可使用
#           console，但需关注 console locality 压力。
# 配置依据：当前参考值使用进程 PID 区分 parcel 日志文件，避免并发进程互相覆盖。
# 作用与关联：只有 parcel level>0 时输出；该文件不由 zpp 日志轮转机制管理，需要外部
#             清理或使用受控的短时诊断窗口。
# destination = ${HPX_PARCEL_LOGDESTINATION:file(hpx.parcel.$[system.pid].log)}
