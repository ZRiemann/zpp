# [BUILD] HPX_SMALL_STACK_SIZE varies:
#   common Release              65536
#   common Debug               131072
#   AddressSanitizer           262144
#   Windows/fcontext-dependent  16384
#   PowerPC/Intel              131072
# small_size = ${HPX_SMALL_STACK_SIZE:<compiled-HPX_SMALL_STACK_SIZE>}

# medium_size = ${HPX_MEDIUM_STACK_SIZE:131072}
# large_size = ${HPX_LARGE_STACK_SIZE:2097152}
# huge_size = ${HPX_HUGE_STACK_SIZE:33554432}

# [BUILD/PLATFORM: Linux or FreeBSD coroutine guard pages]
# use_guard_pages = ${HPX_USE_GUARD_PAGES:1}


