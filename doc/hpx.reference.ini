# ==============================================================================
# HPX fully commented configuration reference template
# ==============================================================================
#
# Source snapshot:
#   Repository : TheHPXProject/hpx
#   Commit     : 71a7cca71263953a3414c14a0749784e1605067e
#   Generated  : 2026-07-13
#
# Purpose:
#   - Collect the built-in runtime defaults from HPX master source.
#   - Add configuration keys documented by the HPX launching/configuration manual.
#   - Add source-recognized and runtime-generated keys that are useful for
#     diagnostics or advanced configuration.
#
# Important:
#   1. This is a comprehensive REFERENCE template, not a byte-for-byte dump from
#      one particular HPX build.
#   2. Every configurable assignment is intentionally commented out. Loading
#      this file therefore does not explicitly override HPX built-in defaults.
#   3. Copy only the settings your application must override into a separate
#      hpx.ini, or uncomment selected entries after reviewing them.
#   4. Values marked [BUILD] exist only when the corresponding feature was enabled
#      at CMake/configure time.
#   5. Values marked [RUNTIME] are normally generated by HPX. They are commented
#      out so this file does not overwrite them.
#   6. Values marked [PLUGIN] exist only when that parcelport/plugin was built.
#   7. Build/platform-dependent defaults should be verified with:
#
#          ./your_hpx_application --hpx:dump-config
#
#      or:
#
#          ./your_hpx_application --hpx:dump-config-initial
#
# HPX INI substitutions:
#   ${ENVIRONMENT_VARIABLE:default_value}
#   $[section.key:default_value]
#
# Path-list delimiter:
#   Unix/macOS: :
#   Windows   : ;
#
# Typical loading methods:
#   - ./your_app --hpx:config=/path/to/hpx.ini
#   - export HPX_INI=/path/to/hpx.ini
#   - install/use .hpx.ini or hpx.ini in an HPX search location
#
# Source-vs-manual notes for this snapshot:
#   - HPX_INITIAL_IP_PORT is 7910.
#   - HPX_SPINLOCK_DEADLOCK_DETECTION_LIMIT is 1073741823 in source.
#   - Small stack size is build/platform dependent; common Release default is
#     65536 bytes, but Debug, ASan, Windows, PowerPC, and Intel builds differ.
#   - Current source uses component_paths/component_base_paths/
#     component_path_suffixes; some manual examples still show component_path.
# ==============================================================================


# ------------------------------------------------------------------------------
# Application-defined settings
# ------------------------------------------------------------------------------
[application]
# Put application-specific configuration entries here.
# example_key = example_value


# ------------------------------------------------------------------------------
# Process/build paths generated by HPX
# ------------------------------------------------------------------------------
[system]
# [RUNTIME] Current process ID.
# pid = <current-process-id>

# [RUNTIME] Prefix from which HPX was loaded.
# prefix = <hpx-install-prefix>

# [RUNTIME] Prefix of the current executable.
# executable_prefix = <application-prefix>


# ------------------------------------------------------------------------------
# Main HPX runtime configuration
# ------------------------------------------------------------------------------
[hpx]

# Installation and component discovery
# location = ${HPX_LOCATION:$[system.prefix]}
# component_paths = ${HPX_COMPONENT_PATHS}
# component_base_paths = $[hpx.location]:$[system.executable_prefix]

# [BUILD] Generated from HPX_DEFAULT_COMPONENT_PATH_SUFFIXES.
# Leave commented to retain the exact value compiled into HPX.
# component_path_suffixes = /lib/hpx

# master_ini_path = $[hpx.location]:$[system.executable_prefix]/

# [BUILD] Generated from HPX_BASE_DIR_NAME, currently typically hpx-2.0.0.
# master_ini_path_suffixes = /share/hpx-2.0.0:/../share/hpx-2.0.0

# Legacy/manual spelling retained as a reference. Current source uses the
# component_* and master_ini_path_* entries above.
# component_path = $[hpx.location]/lib/hpx:$[system.executable_prefix]/lib/hpx
# ini_path = $[hpx.master_ini_path]/ini

# [BUILD] Intel ITT notification support.
# use_itt_notify = ${HPX_HAVE_ITTNOTIFY:0}

# Shutdown/finalization behavior
# finalize_wait_time = ${HPX_FINALIZE_WAIT_TIME:-1.0}
# shutdown_timeout = ${HPX_SHUTDOWN_TIMEOUT:-1.0}
# shutdown_check_count = ${HPX_SHUTDOWN_CHECK_COUNT:10}

# [BUILD: HPX_WITH_VERIFY_LOCKS]
# Debug builds default lock_detection to 1; non-Debug builds default to 0.
# lock_detection = ${HPX_LOCK_DETECTION:0}
# throw_on_held_lock = ${HPX_THROW_ON_HELD_LOCK:1}

# [BUILD: HPX_WITH_THREAD_DEADLOCK_DETECTION]
# Debug builds default to 1; other build types default to 0.
# minimal_deadlock_detection = ${HPX_MINIMAL_DEADLOCK_DETECTION:0}

# [BUILD: HPX_WITH_SPINLOCK_DEADLOCK_DETECTION]
# Debug builds default to 1; other build types default to 0.
# spinlock_deadlock_detection = ${HPX_SPINLOCK_DEADLOCK_DETECTION:0}
# spinlock_deadlock_detection_limit = ${HPX_SPINLOCK_DEADLOCK_DETECTION_LIMIT:1073741823}

# Distributed runtime startup
# expect_connecting_localities = ${HPX_EXPECT_CONNECTING_LOCALITIES:0}

# Worker resources
# os_threads = ${HPX_NUM_WORKER_THREADS:cores}
# cores = all
# localities = 1
# first_pu = 0

# Valid runtime modes include: console, worker, connect, local.
# runtime_mode = console

# Scheduler selected for the default pool.
# scheduler = local-priority-fifo

# Affinity domain. Valid values: pu, core, numa, machine.
# The command-line handling code may normalize the effective default to "pu".
# affinity = core

# Explicit bind description. When no explicit bind/offset/step is supplied,
# HPX normally generates "balanced" on supported non-macOS platforms.
# bind =

# pu_step = 1
# pu_offset = 0

# 0: disabled; 1/2: increasingly NUMA-sensitive scheduler behavior.
# numa_sensitive = 0

# Respect the process CPU mask when choosing PUs.
# use_process_mask = 0

# Enable parcel traffic to the same locality through the network layer.
# loopback_network = 0

# Source-recognized minimum. When absent, it defaults to the resolved os_threads.
# force_min_os_threads = <resolved-os-thread-count>

# Number of worker threads allowed to perform scheduler background work.
# max_background_threads = ${HPX_MAX_BACKGROUND_THREADS:$[hpx.os_threads]}

# Internal scheduler loop thresholds.
# max_idle_loop_count = ${HPX_MAX_IDLE_LOOP_COUNT:200000}
# max_busy_loop_count = ${HPX_MAX_BUSY_LOOP_COUNT:2000}

# [BUILD: HPX_WITH_THREAD_MANAGER_IDLE_BACKOFF], milliseconds.
# max_idle_backoff_time = ${HPX_MAX_IDLE_BACKOFF_TIME:1000}

# [BUILD] Bitmask/string compiled into HPX; leave environment-driven.
# default_scheduler_mode = ${HPX_DEFAULT_SCHEDULER_MODE}

# Valid debugger modes: off, startup, exception, test-failure.
# A test build may compile test-failure as the fallback.
# attach_debugger = ${HPX_ATTACH_DEBUGGER}

# exception_verbosity = ${HPX_EXCEPTION_VERBOSITY:2}
# trace_depth = ${HPX_TRACE_DEPTH:20}
# handle_signals = ${HPX_HANDLE_SIGNALS:1}
# handle_failed_new = ${HPX_HANDLE_FAILED_NEW:1}

# Run hpx_main on worker/connect localities. Normally 0 unless explicitly asked.
# run_hpx_main = 0

# [RUNTIME] Distributed/runtime identity and command line.
# locality = <assigned-locality-id>
# node = <node-number>
# nodes = <expanded-node-list>
# program_name = <argv[0]>
# cmd_line = <complete-original-command-line>
# reconstructed_cmd_line = <non-HPX/application-command-line>
# unknown_cmd_line = <unregistered-options>
# cmd_line_help = <generated-full-help-text>
# cmd_line_help_option = <minimal-or-full>


