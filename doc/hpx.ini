# ==============================================================================
# HPX common runtime configuration
# ==============================================================================
#
# This file is a curated starting point for settings applications commonly
# customize. All assignments are commented out so loading this file preserves
# the defaults compiled into the installed HPX runtime. Uncomment only the
# settings the application must override.
#
# Load this file with:
#
#   ./your_hpx_application --hpx:config=/path/to/hpx.ini
#
# Inspect the effective configuration with:
#
#   ./your_hpx_application --hpx:config=/path/to/hpx.ini --hpx:dump-config
#
# See hpx.reference.ini for the comprehensive key reference, build-dependent
# settings, plugin-specific sections, and advanced scheduler tuning.
# See zh-CN/hpx.ini for detailed Chinese tuning guidance for these settings.
# ==============================================================================


# ------------------------------------------------------------------------------
# Worker resources and scheduling
# ------------------------------------------------------------------------------
[hpx]

# Worker threads. "cores" lets HPX select one worker per available core.
# os_threads = ${HPX_NUM_WORKER_THREADS:cores}

# Limit the topology exposed to HPX; "all" uses all available cores.
# cores = all

# Number of distributed HPX localities started by the launcher.
# localities = 1

# Runtime role: console, worker, connect, or local.
# runtime_mode = console

# Scheduler used by the default thread pool.
# scheduler = local-priority-fifo

# Affinity domain: pu, core, numa, or machine.
# affinity = core

# Explicit worker binding policy. "balanced" spreads workers over resources.
# bind = balanced

# NUMA scheduler sensitivity: 0 disables it; 1 and 2 increase sensitivity.
# numa_sensitive = 0

# Respect the CPU affinity mask inherited by this process.
# use_process_mask = 1

# Workers allowed to perform scheduler background work.
# max_background_threads = ${HPX_MAX_BACKGROUND_THREADS:$[hpx.os_threads]}


# ------------------------------------------------------------------------------
# Shutdown and diagnostics
# ------------------------------------------------------------------------------

# Seconds to wait for shutdown; -1 disables the timeout.
# shutdown_timeout = ${HPX_SHUTDOWN_TIMEOUT:-1.0}

# Debugger attachment mode: off, startup, exception, or test-failure.
# attach_debugger = ${HPX_ATTACH_DEBUGGER}

# Exception details and backtrace depth.
# exception_verbosity = ${HPX_EXCEPTION_VERBOSITY:2}
# trace_depth = ${HPX_TRACE_DEPTH:20}

# Let HPX install signal and allocation-failure handlers.
# handle_signals = ${HPX_HANDLE_SIGNALS:1}
# handle_failed_new = ${HPX_HANDLE_FAILED_NEW:1}


# ------------------------------------------------------------------------------
# Internal OS-thread pools
# Availability depends on the installed HPX build options.
# ------------------------------------------------------------------------------
[hpx.threadpools]

# io_pool_size = ${HPX_NUM_IO_POOL_SIZE:2}
# parcel_pool_size = ${HPX_NUM_PARCEL_POOL_SIZE:2}
# timer_pool_size = ${HPX_NUM_TIMER_POOL_SIZE:2}


# ------------------------------------------------------------------------------
# Distributed runtime and AGAS
# Use these settings only for multi-locality applications.
# ------------------------------------------------------------------------------
[hpx.agas]

# Bootstrap AGAS endpoint shared by all localities.
# address = ${HPX_AGAS_SERVER_ADDRESS:127.0.0.1}
# port = ${HPX_AGAS_SERVER_PORT:7910}

# hosted uses a remote/bootstrap AGAS service; bootstrap hosts that service.
# service_mode = hosted

# AGAS client-side cache tuning.
# local_cache_size = ${HPX_AGAS_LOCAL_CACHE_SIZE:4096}
# use_range_caching = ${HPX_AGAS_USE_RANGE_CACHING:1}
# use_caching = ${HPX_AGAS_USE_CACHING:1}


# ------------------------------------------------------------------------------
# Parcel networking
# Availability depends on HPX_WITH_NETWORKING and the installed parcel plugins.
# ------------------------------------------------------------------------------
[hpx.parcel]

# Local parcel endpoint.
# address = ${HPX_PARCEL_SERVER_ADDRESS:127.0.0.1}
# port = ${HPX_PARCEL_SERVER_PORT:7910}

# Connection and message-size limits, in bytes where applicable.
# max_connections = ${HPX_PARCEL_MAX_CONNECTIONS:512}
# max_connections_per_locality = ${HPX_PARCEL_MAX_CONNECTIONS_PER_LOCALITY:4}
# max_message_size = ${HPX_PARCEL_MAX_MESSAGE_SIZE:1000000000}
# max_outbound_message_size = ${HPX_PARCEL_MAX_OUTBOUND_MESSAGE_SIZE:1000000}

# Serialization optimizations.
# array_optimization = ${HPX_PARCEL_ARRAY_OPTIMIZATION:1}
# zero_copy_optimization = ${HPX_PARCEL_ZERO_COPY_OPTIMIZATION:$[hpx.parcel.array_optimization]}
# zero_copy_receive_optimization = ${HPX_PARCEL_ZERO_COPY_RECEIVE_OPTIMIZATION:$[hpx.parcel.zero_copy_optimization]}
# async_serialization = ${HPX_PARCEL_ASYNC_SERIALIZATION:1}


# ------------------------------------------------------------------------------
# HPX internal logging
# Availability depends on HPX_WITH_LOGGING. Higher levels increase verbosity.
# Common destinations: console, cout, cerr, and file(filename).
# ------------------------------------------------------------------------------
[hpx.logging]

# level = ${HPX_LOGLEVEL:0}
# destination = ${HPX_LOGDESTINATION:console}

[hpx.logging.timing]

# level = ${HPX_TIMING_LOGLEVEL:-1}
# destination = ${HPX_TIMING_LOGDESTINATION:console}

[hpx.logging.parcel]

# level = ${HPX_PARCEL_LOGLEVEL:-1}
# destination = ${HPX_PARCEL_LOGDESTINATION:file(hpx.parcel.$[system.pid].log)}
